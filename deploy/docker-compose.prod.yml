services:
  web:
    image: ${PORTFOLIO_IMAGE:?PORTFOLIO_IMAGE is required}
    container_name: portfolio-web
    init: true
    ports:
      - "${HOST_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
