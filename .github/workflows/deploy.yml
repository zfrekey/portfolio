name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?HOSTINGER_HOST secret is required}"
          : "${SSH_KEY:?HOSTINGER_SSH_KEY secret is required}"
          : "${SSH_USER:?HOSTINGER_SSH_USER secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_KEY" > ~/.ssh/hostinger
          chmod 600 ~/.ssh/hostinger

          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          APP_PORT: ${{ vars.APP_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          HOST_BIND: ${{ vars.HOST_BIND }}
          PORTFOLIO_IMAGE: ${{ steps.image.outputs.name }}:${{ github.sha }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -euo pipefail

          APP_PORT="${APP_PORT:-3000}"
          DEPLOY_PATH="${DEPLOY_PATH:-apps/portfolio}"
          HOST_BIND="${HOST_BIND:-127.0.0.1}"
          SSH_PORT="${SSH_PORT:-22}"
          SSH_TARGET="${SSH_USER}@${SSH_HOST}"

          ssh -i ~/.ssh/hostinger -p "$SSH_PORT" "$SSH_TARGET" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/hostinger -P "$SSH_PORT" deploy/docker-compose.prod.yml "$SSH_TARGET:$DEPLOY_PATH/docker-compose.yml"

          ssh -i ~/.ssh/hostinger -p "$SSH_PORT" "$SSH_TARGET" "cat > '$DEPLOY_PATH/.env'" <<EOF
          PORTFOLIO_IMAGE=$PORTFOLIO_IMAGE
          APP_PORT=$APP_PORT
          HOST_BIND=$HOST_BIND
          EOF

          printf '%s\n' "$GHCR_TOKEN" | ssh -i ~/.ssh/hostinger -p "$SSH_PORT" "$SSH_TARGET" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

          ssh -i ~/.ssh/hostinger -p "$SSH_PORT" "$SSH_TARGET" "cd '$DEPLOY_PATH' \
            && docker compose --env-file .env pull \
            && docker compose --env-file .env up -d --remove-orphans \
            && docker image prune -f \
            && docker compose --env-file .env ps"
